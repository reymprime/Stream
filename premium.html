<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnokz Music — Premium Stream</title>
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <style>
        :root {
            --bg-void: #010101;
            --bg-deep: #030305;
            --brand-green: #1db954;
            --brand-green-bright: #1fdf64;
            --brand-glow: rgba(29, 185, 84, 0.45);
            --brand-glow-soft: rgba(29, 185, 84, 0.18);
            --text-main: #f5f5f7;
            --text-muted: #98989d;
            --text-dim: #6e6e73;

            --glass-surface: rgba(255, 255, 255, 0.025);
            --glass-surface-hover: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-border-glow: rgba(29, 185, 84, 0.25);
            --glass-inner-glow: rgba(29, 185, 84, 0.06);
            --shadow-premium: 0 24px 48px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 60px rgba(29, 185, 84, 0.12);
            --radius-xl: 24px;
            --radius-2xl: 30px;
            --radius-3xl: 36px;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-main);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Ambient OLED Fluid Mesh ── */
        .liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%, #041208 0%, #010101 65%, #000000 100%);
        }
        .liquid-fluid {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.38;
            animation: fluidMorph 28s infinite alternate ease-in-out;
            will-change: transform, border-radius;
        }
        .fluid-1 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.18) 0%, transparent 75%);
            top: -250px;
            left: -180px;
        }
        .fluid-2 {
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(0, 200, 180, 0.08) 0%, transparent 75%);
            bottom: -200px;
            right: -130px;
            animation-delay: -8s;
        }
        .fluid-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.1) 0%, transparent 80%);
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -16s;
            opacity: 0.25;
        }

        @keyframes fluidMorph {
            0% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
                border-radius: 38% 62% 48% 52%;
            }
            25% {
                transform: translate(40px, -30px) scale(1.08) rotate(20deg);
                border-radius: 55% 45% 58% 42%;
            }
            50% {
                transform: translate(-20px, 25px) scale(1.04) rotate(40deg);
                border-radius: 42% 58% 52% 48%;
            }
            75% {
                transform: translate(55px, 15px) scale(1.1) rotate(55deg);
                border-radius: 60% 40% 44% 56%;
            }
            100% {
                transform: translate(30px, -45px) scale(1.06) rotate(70deg);
                border-radius: 50% 50% 55% 45%;
            }
        }

        /* ── Main Container ── */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 32px 20px;
            box-sizing: border-box;
            margin-bottom: 140px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--brand-green-bright);
            box-shadow: 0 0 16px var(--brand-glow), 0 0 40px rgba(29, 185, 84, 0.25);
            animation: logoPulse 2.5s infinite ease-in-out;
        }
        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 0 16px var(--brand-glow), 0 0 40px rgba(29, 185, 84, 0.25);
            }
            50% {
                box-shadow: 0 0 24px var(--brand-glow), 0 0 60px rgba(29, 185, 84, 0.4);
            }
        }
        h2 {
            font-size: 25px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 35%, #b0b0b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.6px;
            line-height: 1;
        }
        .back-luxury-btn {
            background: var(--glass-surface);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            color: var(--text-main);
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.35s var(--ease-out-expo);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .back-luxury-btn:hover {
            background: var(--glass-surface-hover);
            border-color: rgba(255, 255, 255, 0.14);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }
        .back-luxury-btn:active {
            transform: translateY(0) scale(0.97);
        }

        .premium-tagline {
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 700;
            margin-top: 4px;
            margin-bottom: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            padding: 0 4px;
        }

        /* ── Showroom Grid ── */
        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 26px;
        }
        .glass-card {
            background: linear-gradient(160deg,
                    rgba(255, 255, 255, 0.025) 0%,
                    rgba(255, 255, 255, 0.008) 100%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: var(--radius-xl);
            padding: 24px 14px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.45s var(--ease-out-expo);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(29, 185, 84, 0.12), transparent 65%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
            pointer-events: none;
        }
        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            border: 1px solid transparent;
            transition: border-color 0.45s ease;
            z-index: 0;
            pointer-events: none;
        }
        .glass-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--glass-border-glow);
            box-shadow: 0 20px 44px rgba(29, 185, 84, 0.14), 0 0 0 1px rgba(29, 185, 84, 0.1);
        }
        .glass-card:hover::before {
            opacity: 1;
        }
        .glass-card:hover::after {
            border-color: rgba(29, 185, 84, 0.2);
        }
        .glass-card:active {
            transform: translateY(-3px) scale(0.97);
            transition: all 0.15s ease;
        }
        .card-icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.08);
        }
        .glass-card:hover .card-icon-circle {
            background: rgba(29, 185, 84, 0.18);
            border-color: rgba(29, 185, 84, 0.35);
            box-shadow: 0 0 30px rgba(29, 185, 84, 0.2);
            transform: scale(1.06);
        }
        .card-icon-circle i {
            color: var(--brand-green-bright);
            width: 20px;
            height: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.4px;
            color: #ffffff;
            position: relative;
            z-index: 1;
        }
        .card-status {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--brand-green);
            opacity: 0.85;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px var(--brand-glow);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brand-green-bright);
            display: inline-block;
            box-shadow: 0 0 6px var(--brand-glow);
            animation: logoPulse 2.5s infinite ease-in-out;
        }

        /* ── Track Container ── */
        .premium-track-container {
            background: rgba(255, 255, 255, 0.012);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            border-radius: var(--radius-2xl);
            padding: 12px;
            min-height: 200px;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.55), 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .premium-track-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(29, 185, 84, 0.2), transparent);
            opacity: 0.6;
            pointer-events: none;
            z-index: 2;
        }
        .track-empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 56px 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
        }
        .track-empty-state i {
            width: 32px;
            height: 32px;
            color: var(--brand-green);
            opacity: 0.5;
        }

        /* ── Track Row ── */
        .track-luxury-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 18px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.35s var(--ease-out-expo);
            border: 1px solid transparent;
            background: transparent;
        }
        .track-luxury-item:last-child {
            margin-bottom: 0;
        }
        .track-luxury-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.04);
        }
        .track-luxury-item.active-highlight {
            background: linear-gradient(100deg,
                    rgba(29, 185, 84, 0.1) 0%,
                    rgba(29, 185, 84, 0.02) 60%,
                    rgba(255, 255, 255, 0.01) 100%) !important;
            border: 1px solid rgba(29, 185, 84, 0.25);
            box-shadow: inset 0 0 20px rgba(29, 185, 84, 0.04), 0 4px 16px rgba(29, 185, 84, 0.08);
            transform: translateX(3px);
        }
        .track-luxury-item.active-highlight::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 28px;
            border-radius: 0 6px 6px 0;
            background: var(--brand-green-bright);
            box-shadow: 0 0 14px var(--brand-glow);
        }
        .track-luxury-thumb {
            width: 50px;
            height: 50px;
            border-radius: 13px;
            object-fit: cover;
            background: #0d0d10;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
            transition: all 0.35s ease;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .track-luxury-item.active-highlight .track-luxury-thumb {
            transform: scale(1.06);
            box-shadow: 0 8px 22px rgba(29, 185, 84, 0.2);
            border-color: rgba(29, 185, 84, 0.3);
        }
        .track-luxury-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
        }
        .track-luxury-title {
            font-weight: 700;
            font-size: 14px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }
        .track-luxury-item.active-highlight .track-luxury-title {
            color: var(--brand-green-bright);
        }
        .track-luxury-author {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .inline-track-progress-bar {
            width: 100%;
            height: 2.5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 8px;
            display: none;
            position: relative;
            overflow: hidden;
        }
        .track-luxury-item.active-highlight .inline-track-progress-bar {
            display: block;
        }
        .inline-track-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-green);
            border-radius: 10px;
            transition: width 0.08s linear;
            box-shadow: 0 0 8px rgba(29, 185, 84, 0.5);
        }

        #showroom-hidden-player {
            display: none;
        }

        /* ── Floating Bottom Deck ── */
        .floating-bottom-deck-wrapper {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translate(-50%, 30px);
            width: calc(100% - 32px);
            max-width: 440px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s var(--ease-spring);
            filter: drop-shadow(0 16px 40px rgba(0, 0, 0, 0.7));
        }
        .floating-bottom-deck-wrapper.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }
        .floating-deck-card {
            background: rgba(12, 14, 18, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 22px;
            padding: 10px 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75), inset 0 0 25px rgba(255, 255, 255, 0.015);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .floating-deck-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(14, 16, 20, 0.82);
        }
        .floating-deck-card:active {
            transform: scale(0.985);
            transition: transform 0.12s ease;
        }
        .deck-art-frame {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            object-fit: cover;
            background: #09090c;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .deck-core-meta {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .deck-status-indicator {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--brand-green);
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .deck-status-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--brand-green-bright);
            box-shadow: 0 0 6px var(--brand-glow);
            animation: logoPulse 2s infinite ease-in-out;
        }
        .deck-track-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }
        .deck-track-author {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .deck-control-node {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }
        .deck-control-node:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(255, 255, 255, 0.3);
        }
        .deck-control-node:active {
            transform: scale(0.9);
        }
        .deck-base-progress-wire {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2.5px;
            background: rgba(255, 255, 255, 0.03);
        }
        .deck-base-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-green);
            transition: width 0.08s linear;
            box-shadow: 0 0 8px rgba(29, 185, 84, 0.5);
        }

        /* ── Fullscreen Overlay ── */
        .premium-music-card-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(1, 1, 1, 0.88);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s var(--ease-out-expo);
        }
        .premium-music-card-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .luxury-card-frame {
            width: calc(100% - 36px);
            max-width: 400px;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.035) 0%,
                    rgba(255, 255, 255, 0.008) 100%);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: var(--radius-3xl);
            padding: 24px 22px 28px;
            box-sizing: border-box;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.85), inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 0 80px rgba(29, 185, 84, 0.06);
            transform: translateY(60px) scale(0.93);
            transition: all 0.5s var(--ease-spring);
            position: relative;
        }
        .premium-music-card-overlay.active .luxury-card-frame {
            transform: translateY(0) scale(1);
        }
        .card-dismiss-trigger {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card-dismiss-trigger:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .card-dismiss-trigger:active {
            transform: scale(0.94);
        }
        .card-main-visual-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 26px;
            overflow: hidden;
            background: #0a0a0e;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04);
            margin-bottom: 24px;
        }
        .card-artwork-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-track-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding: 0 2px;
        }
        .card-meta-left {
            min-width: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .card-tag-sub {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--brand-green);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--brand-glow);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-tag-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brand-green-bright);
            box-shadow: 0 0 8px var(--brand-glow);
            animation: logoPulse 2s infinite ease-in-out;
        }
        .card-track-name {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .card-track-author {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ── Timeline Slider ── */
        .card-timeline-slider {
            width: 100%;
            margin-bottom: 28px;
            padding: 0 2px;
            box-sizing: border-box;
        }
        .slider-rail {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s ease;
        }
        .slider-rail:hover {
            height: 7px;
        }
        .slider-fluid-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-green);
            border-radius: 10px;
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 14px var(--brand-glow);
            transition: width 0.08s linear;
        }
        .slider-handle-bubble {
            width: 15px;
            height: 15px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.6), 0 0 20px rgba(29, 185, 84, 0.3);
            transition: transform 0.25s var(--ease-spring);
            z-index: 2;
        }
        .slider-rail:hover .slider-handle-bubble {
            transform: translate(-50%, -50%) scale(1);
        }
        .slider-time-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        /* ── Controls ── */
        .card-controls-block {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-center-cluster {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .card-skip-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.25s ease;
            padding: 10px;
            opacity: 0.8;
            border-radius: 50%;
        }
        .card-skip-btn:hover {
            transform: scale(1.18);
            opacity: 1;
            color: var(--brand-green-bright);
        }
        .card-skip-btn:active {
            transform: scale(0.88);
        }
        .card-master-action {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 28px rgba(255, 255, 255, 0.22), 0 0 40px rgba(29, 185, 84, 0.15);
            transition: all 0.3s var(--ease-spring);
        }
        .card-master-action:hover {
            transform: scale(1.1);
            box-shadow: 0 14px 34px rgba(255, 255, 255, 0.35), 0 0 55px rgba(29, 185, 84, 0.25);
        }
        .card-master-action:active {
            transform: scale(0.9);
        }

        /* ── Scrollbar ── */
        .premium-track-container::-webkit-scrollbar {
            width: 3px;
        }
        .premium-track-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .premium-track-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }

        /* ── Responsive ── */
        @media (max-width: 380px) {
            .container {
                padding: 24px 12px;
            }
            .showroom-grid {
                gap: 10px;
            }
            .glass-card {
                padding: 18px 10px 16px;
                border-radius: 20px;
            }
            .card-title {
                font-size: 14px;
            }
            .luxury-card-frame {
                padding: 18px 14px 22px;
                border-radius: 28px;
            }
            .card-track-name {
                font-size: 18px;
            }
            .card-master-action {
                width: 52px;
                height: 52px;
            }
            .card-center-cluster {
                gap: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient OLED Fluid Canvas -->
    <div class="liquid-canvas">
        <div class="liquid-fluid fluid-1"></div>
        <div class="liquid-fluid fluid-2"></div>
        <div class="liquid-fluid fluid-3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-brand">
                <div class="header-logo-dot"></div>
                <h2>Gnokz Exclusive</h2>
            </div>
            <button class="back-luxury-btn" onclick="window.location.href='index.html'">
                <i data-lucide="arrow-left" style="width:15px; height:15px;"></i>
                <span>Go Back</span>
            </button>
        </div>
        <div class="premium-tagline">Select playlists to stream.</div>

        <!-- Showroom Grid -->
        <div class="showroom-grid">
            <!-- OPM -->
            <div class="glass-card opm-card" onclick="ShowroomEngine.fetchPlaylist('PLoJUYYhXz9pZSIxWJgUFgHyNvNoEfmiLs&si')">
                <div class="card-icon-circle">
                    <i data-lucide="music-4" style="width:20px; height:20px; color:#1fdf64;"></i>
                </div>
                <div class="card-title">OPM</div>
                <div class="card-status">
                    <span class="card-status-dot"></span> Stream
                </div>
            </div>
            <!-- EDM -->
            <div class="glass-card edm-card" onclick="ShowroomEngine.fetchPlaylist('PLoJUYYhXz9pZCM3S7C51QUx1-nfpM5wJt&si')">
                <div class="card-icon-circle">
                    <i data-lucide="zap" style="width:20px; height:20px; color:#1fdf64;"></i>
                </div>
                <div class="card-title">EDM</div>
                <div class="card-status">
                    <span class="card-status-dot"></span> Stream
                </div>
            </div>
            <!-- ROCK -->
            <div class="glass-card rock-card" onclick="ShowroomEngine.fetchPlaylist('PLoJUYYhXz9pbPRJzZ9gteVvJJ0netZvEN&si')">
                <div class="card-icon-circle">
                    <i data-lucide="guitar" style="width:20px; height:20px; color:#1fdf64;"></i>
                </div>
                <div class="card-title">ROCK</div>
                <div class="card-status">
                    <span class="card-status-dot"></span> Stream
                </div>
            </div>
            <!-- OMS -->
            <div class="glass-card oms-card" onclick="ShowroomEngine.fetchPlaylist('PLoJUYYhXz9pYfR36_FWRAzL7nU2zuGPGR&si')">
                <div class="card-icon-circle">
                    <i data-lucide="headphones" style="width:20px; height:20px; color:#1fdf64;"></i>
                </div>
                <div class="card-title">OMS</div>
                <div class="card-status">
                    <span class="card-status-dot"></span> Stream
                </div>
            </div>
        </div>

        <!-- Track List Container -->
        <div class="premium-track-container" id="showroom-tracks">
            <div class="track-empty-state">
                <i data-lucide="list-music" style="width:28px; height:28px; color:#1db954; opacity:0.45;"></i>
                <span>CHOOSE PLAYLISTS ABOVE</span>
            </div>
        </div>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="showroom-hidden-player"></div>

    <!-- Floating Bottom Deck -->
    <div class="floating-bottom-deck-wrapper" id="floating-deck-wrapper">
        <div class="floating-deck-card" onclick="ShowroomEngine.openPlayerCardOverlay()">
            <img class="deck-art-frame" id="deck-hero-thumb" src="" alt="Track Art">
            <div class="deck-core-meta">
                <div class="deck-status-indicator" id="deck-status-label">
                    <span class="deck-status-dot"></span> GNOKZ • ARCHIVE STREAM
                </div>
                <div class="deck-track-name" id="deck-hero-title">Track Title</div>
                <div class="deck-track-author" id="deck-hero-author">Artist Name</div>
            </div>
            <button class="deck-control-node" onclick="event.stopPropagation(); ShowroomEngine.togglePlayback();">
                <i data-lucide="play" id="deck-micro-play-icon" style="width:15px; height:15px; fill:#000;"></i>
            </button>
            <div class="deck-base-progress-wire">
                <div class="deck-base-progress-fill" id="deck-wire-fill"></div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Player Overlay -->
    <div class="premium-music-card-overlay" id="luxury-card-overlay">
        <div class="luxury-card-frame">
            <!-- Dismiss -->
            <button class="card-dismiss-trigger" onclick="ShowroomEngine.closePlayerCardOverlay()">
                <i data-lucide="chevron-down" style="width:22px; height:22px;"></i>
            </button>

            <!-- Artwork -->
            <div class="card-main-visual-box">
                <img class="card-artwork-img" id="card-hero-thumb" src="" alt="Album Art">
            </div>

            <!-- Track Meta -->
            <div class="card-track-meta">
                <div class="card-meta-left">
                    <div class="card-tag-sub" id="playback-status-label">
                        <span class="card-tag-dot"></span> GNOKZ • ARCHIVE STREAM
                    </div>
                    <div class="card-track-name" id="card-hero-title">Track Name Placeholder</div>
                    <div class="card-track-author" id="card-hero-author">Author Placeholder</div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="card-timeline-slider">
                <div class="slider-rail" onclick="ShowroomEngine.scrubTimeline(event)">
                    <div class="slider-fluid-fill" id="card-progress-fill"></div>
                    <div class="slider-handle-bubble" id="card-progress-bubble"></div>
                </div>
                <div class="slider-time-row">
                    <div id="card-time-current">0:00</div>
                    <div id="card-time-total">0:00</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="card-controls-block">
                <div class="card-center-cluster">
                    <button class="card-skip-btn" onclick="ShowroomEngine.prevTrack()">
                        <i data-lucide="skip-back" style="width:24px; height:24px; fill:#fff;"></i>
                    </button>
                    <button class="card-master-action" onclick="ShowroomEngine.togglePlayback()">
                        <i data-lucide="play" id="card-master-play-icon" style="width:22px; height:22px; fill:#000;"></i>
                    </button>
                    <button class="card-skip-btn" onclick="ShowroomEngine.nextTrack()">
                        <i data-lucide="skip-forward" style="width:24px; height:24px; fill:#fff;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let ytPlayer;
        let progressTimer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('showroom-hidden-player', {
                height: '0',
                width: '0',
                videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0 },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                ShowroomEngine.nextTrack();
            } else if (event.data === YT.PlayerState.PLAYING) {
                ShowroomEngine.isPlaying = true;
                ShowroomEngine.initiateTimelineLoop();
            } else if (event.data === YT.PlayerState.PAUSED) {
                ShowroomEngine.isPlaying = false;
                ShowroomEngine.killTimelineLoop();
            }
            ShowroomEngine.refreshPlayStateIcon();
        }

        function onPlayerReady() {
            // Core playback stream array ready
        }

        const ShowroomEngine = {
            apiKey: "AIzaSyA58g8LJy4f_TiLuv-w61c8vEkq0TJnKhw",
            queue: [],
            currentIndex: -1,
            isPlaying: false,

            async fetchPlaylist(playlistId) {
                const container = document.getElementById('showroom-tracks');
                container.innerHTML =
                    `<div class="track-empty-state"><i data-lucide="loader-2" style="width:24px; height:24px; color:#1db954; animation: spin 1s linear infinite;"></i><span>LOADING PLAYLIST…</span></div>`;
                lucide.createIcons();

                const url =
                    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${this.apiKey}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    if (data.items && data.items.length > 0) {
                        this.queue = data.items
                            .filter(item => item.snippet.title !== "Deleted video" && item.snippet.title !==
                                "Private video")
                            .slice(0, 20)
                            .map(item => ({
                                id: item.snippet.resourceId.videoId,
                                title: item.snippet.title,
                                author: item.snippet.videoOwnerChannelTitle || "Gnokz Premium Suite",
                                thumb: `https://i.ytimg.com/vi/${item.snippet.resourceId.videoId}/mqdefault.jpg`
                            }));
                        this.renderShowroomTracks();
                    } else {
                        container.innerHTML =
                            `<div class="track-empty-state"><i data-lucide="circle-alert" style="width:24px; height:24px; color:#ff4444;"></i><span>EMPTY STREAM ARCHIVE</span></div>`;
                        lucide.createIcons();
                    }
                } catch (err) {
                    console.error(err);
                    container.innerHTML =
                        `<div class="track-empty-state"><i data-lucide="wifi-off" style="width:24px; height:24px; color:#ff4444;"></i><span>COMING UP SOON</span></div>`;
                    lucide.createIcons();
                }
            },

            renderShowroomTracks() {
                const container = document.getElementById('showroom-tracks');
                container.innerHTML = '';

                this.queue.forEach((track, index) => {
                    const div = document.createElement('div');
                    div.className = 'track-luxury-item';
                    div.id = `track-item-${index}`;
                    div.onclick = () => this.executeTrackSelection(index);

                    div.innerHTML = `
                        <img class="track-luxury-thumb" src="${track.thumb}" alt="Thumbnail">
                        <div class="track-luxury-info">
                            <div class="track-luxury-title">${track.title}</div>
                            <div class="track-luxury-author">${track.author}</div>
                            <div class="inline-track-progress-bar">
                                <div class="inline-track-progress-fill" id="inline-fill-${index}"></div>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });

                this.syncActiveTrackHighlight();
                lucide.createIcons();
            },

            executeTrackSelection(index) {
                if (index < 0 || index >= this.queue.length) return;
                this.currentIndex = index;
                const track = this.queue[index];

                document.getElementById('card-hero-title').innerText = track.title;
                document.getElementById('card-hero-author').innerText = track.author;
                document.getElementById('card-hero-thumb').src = track.thumb;

                document.getElementById('deck-hero-title').innerText = track.title;
                document.getElementById('deck-hero-author').innerText = track.author;
                document.getElementById('deck-hero-thumb').src = track.thumb;

                document.getElementById('floating-deck-wrapper').classList.add('visible');

                this.syncActiveTrackHighlight();

                ytPlayer.loadVideoById(track.id);
                this.isPlaying = true;
                this.refreshPlayStateIcon();
            },

            syncActiveTrackHighlight() {
                document.querySelectorAll('.track-luxury-item').forEach(el => {
                    el.classList.remove('active-highlight');
                });
                const activeElem = document.getElementById(`track-item-${this.currentIndex}`);
                if (activeElem) {
                    activeElem.classList.add('active-highlight');
                }
            },

            openPlayerCardOverlay() {
                if (this.currentIndex === -1) return;
                document.getElementById('luxury-card-overlay').classList.add('active');
            },

            closePlayerCardOverlay() {
                document.getElementById('luxury-card-overlay').classList.remove('active');
            },

            togglePlayback() {
                if (this.currentIndex === -1) return;
                if (this.isPlaying) {
                    ytPlayer.pauseVideo();
                    this.isPlaying = false;
                } else {
                    ytPlayer.playVideo();
                    this.isPlaying = true;
                }
                this.refreshPlayStateIcon();
            },

            nextTrack() {
                if (this.queue.length === 0) return;
                let target = this.currentIndex < this.queue.length - 1 ? this.currentIndex + 1 : 0;
                this.executeTrackSelection(target);
            },

            prevTrack() {
                if (this.queue.length === 0) return;
                let target = this.currentIndex > 0 ? this.currentIndex - 1 : this.queue.length - 1;
                this.executeTrackSelection(target);
            },

            refreshPlayStateIcon() {
                const mainIcon = document.getElementById('card-master-play-icon');
                const miniIcon = document.getElementById('deck-micro-play-icon');
                const overlayLabel = document.getElementById('playback-status-label');
                const deckLabel = document.getElementById('deck-status-label');

                if (this.isPlaying) {
                    mainIcon.setAttribute('data-lucide', 'pause');
                    miniIcon.setAttribute('data-lucide', 'pause');
                    overlayLabel.innerHTML =
                        '<span class="card-tag-dot"></span> GNOKZ • NOW PLAYING';
                    deckLabel.innerHTML =
                        '<span class="deck-status-dot"></span> GNOKZ • NOW PLAYING';
                } else {
                    mainIcon.setAttribute('data-lucide', 'play');
                    miniIcon.setAttribute('data-lucide', 'play');
                    overlayLabel.innerHTML =
                        '<span class="card-tag-dot" style="opacity:0.35;"></span> GNOKZ • NOT PLAYING';
                    deckLabel.innerHTML =
                        '<span class="deck-status-dot" style="opacity:0.35;"></span> GNOKZ • NOT PLAYING';
                }
                lucide.createIcons();
            },

            formatTimeLayout(seconds) {
                if (isNaN(seconds) || seconds < 0) return "0:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            },

            initiateTimelineLoop() {
                this.killTimelineLoop();
                progressTimer = setInterval(() => {
                    if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && this.isPlaying) {
                        this.updateTimelineTracks();
                    }
                }, 100);
            },

            killTimelineLoop() {
                if (progressTimer) clearInterval(progressTimer);
            },

            updateTimelineTracks() {
                const current = ytPlayer.getCurrentTime();
                const total = ytPlayer.getDuration();

                if (total > 0 && !isNaN(current)) {
                    const percentage = (current / total) * 100;

                    document.getElementById('card-progress-fill').style.width = `${percentage}%`;
                    document.getElementById('card-progress-bubble').style.left = `${percentage}%`;
                    document.getElementById('card-time-current').innerText = this.formatTimeLayout(current);
                    document.getElementById('card-time-total').innerText = this.formatTimeLayout(total);

                    document.getElementById('deck-wire-fill').style.width = `${percentage}%`;

                    const inlineFill = document.getElementById(`inline-fill-${this.currentIndex}`);
                    if (inlineFill) inlineFill.style.width = `${percentage}%`;
                }
            },

            scrubTimeline(event) {
                if (!ytPlayer || this.currentIndex === -1) return;
                const rail = event.currentTarget;
                const rect = rail.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const percentage = Math.max(0, Math.min(1, clickX / rect.width));
                const totalDuration = ytPlayer.getDuration();

                if (totalDuration > 0) {
                    const targetTime = totalDuration * percentage;
                    ytPlayer.seekTo(targetTime, true);
                    document.getElementById('card-progress-fill').style.width = `${percentage * 100}%`;
                    document.getElementById('card-progress-bubble').style.left = `${percentage * 100}%`;
                }
            }
        };

        // Add spin animation for loader
        const spinStyle = document.createElement('style');
        spinStyle.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(spinStyle);

        lucide.createIcons();
    </script>
</body>
</html>
